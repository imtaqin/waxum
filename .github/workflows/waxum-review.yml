name: Waxum Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: waxum-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base
        run: git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

      - name: Collect PR diff + metadata
        id: collect
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -eu

          # Kimi's coder tier accepts ~130k input tokens on kimi-k2. 40k chars of
          # diff ≈ 10k tokens — well under the model limit, roomy for context.
          MAX_DIFF_CHARS=40000

          DIFF_FILE=$(mktemp)
          git diff --stat "origin/$BASE_REF"...HEAD > diff_stat.txt
          git diff --no-color "origin/$BASE_REF"...HEAD > "$DIFF_FILE"

          DIFF_BYTES=$(wc -c < "$DIFF_FILE")
          if [ "$DIFF_BYTES" -gt "$MAX_DIFF_CHARS" ]; then
            head -c "$MAX_DIFF_CHARS" "$DIFF_FILE" > diff_trimmed.txt
            printf '\n[truncated: full diff was %s bytes]\n' "$DIFF_BYTES" >> diff_trimmed.txt
            mv diff_trimmed.txt "$DIFF_FILE"
          fi

          {
            printf '# PR #%s: %s\n\n' "$PR_NUMBER" "$PR_TITLE"
            printf '## Diff stat\n\n```\n'
            cat diff_stat.txt
            printf '```\n\n## Diff\n\n```diff\n'
            cat "$DIFF_FILE"
            printf '```\n'
          } > pr_bundle.md

      - name: Call Kimi
        id: llm
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          set -eu

          if [ -z "${KIMI_API_KEY:-}" ]; then
            echo "::warning::KIMI_API_KEY not set — skipping review"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SYSTEM_PROMPT=$(cat .github/review-context.md)
          BUNDLE=$(cat pr_bundle.md)

          REQUEST=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$BUNDLE" \
            '{
              model: "kimi-k2-0905-preview",
              temperature: 1,
              messages: [
                { role: "system", content: $system },
                { role: "user",   content: $user }
              ]
            }')

          # Kimi's coder endpoint is chatty on completion for large diffs (~2-3
          # minutes end-to-end) so leave a generous curl timeout.
          RESPONSE=$(curl -sS --max-time 300 https://api.kimi.com/coding/v1/chat/completions \
            -H "content-type: application/json" \
            -H "Authorization: Bearer $KIMI_API_KEY" \
            -d "$REQUEST")

          echo "$RESPONSE" > response.json

          TEXT=$(jq -r '.choices[0].message.content // empty' response.json)
          if [ -z "$TEXT" ]; then
            echo "::warning::Kimi returned no message content"
            jq -r '.error // .' response.json | head -c 2000
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s' "$TEXT" > review.md
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Format + post PR comment
        if: steps.llm.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eu

          RAW=$(cat review.md)

          # Kimi likes to wrap JSON in a ```json fence. Strip it before parsing.
          STRIPPED=$(printf '%s' "$RAW" | sed -E '1{s/^```(json)?[[:space:]]*//;}; ${s/[[:space:]]*```[[:space:]]*$//;}')

          if echo "$STRIPPED" | jq -e . >/dev/null 2>&1; then
            SUMMARY=$(echo "$STRIPPED" | jq -r '.summary // "No summary provided."')

            FINDINGS_MD=$(echo "$STRIPPED" | jq -r '
              (.findings // [])
              | map(
                  "- **[" + (.severity | ascii_upcase) + "] " + .title + "**"
                  + (if (.file // "") != "" then " — `" + .file + (if (.line // null) != null then ":" + (.line|tostring) else "" end) + "`" else "" end)
                  + "\n    " + .body
                )
              | if length == 0 then "_No findings._" else join("\n") end
            ')

            {
              printf '### Waxum Review\n\n'
              printf '%s\n\n' "$SUMMARY"
              printf '**Findings**\n\n%s\n\n' "$FINDINGS_MD"
              printf '<sub>Kimi K2 coder, project-specific prompt in `.github/review-context.md`. Not a merge gate.</sub>\n'
            } > comment.md
          else
            {
              printf '### Waxum Review\n\n'
              printf '%s\n\n' "$RAW"
              printf '<sub>Kimi K2 coder, project-specific prompt in `.github/review-context.md`. Not a merge gate.</sub>\n'
            } > comment.md
          fi

          gh pr comment "$PR_NUMBER" --body-file comment.md
