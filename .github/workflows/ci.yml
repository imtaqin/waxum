name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install rustfmt and clippy
        run: |
          rustup component add rustfmt clippy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev cmake build-essential

      # NOTE: `target/` is intentionally excluded from the cache. Some
      # crates (utoipa-swagger-ui, protoc-gen builds) bake absolute
      # build-directory paths into generated code, so restoring a
      # `target/` produced under a different repo path (e.g. an older
      # wa-rs → waxum rename) makes those crates fail to link with
      # "folder does not exist". Caching only the registry keeps cold
      # rebuilds cheap without dragging in path-poisoned artifacts.
      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-waxum-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-waxum-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Build (release)
        run: cargo build --release
