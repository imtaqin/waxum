name: Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: docker.io
  IMAGE_NAME: fdciabdul/waxum
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  # Determine version and create tag
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Extract version from Cargo.toml
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi

          TAG="v${VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

  # Create git tag
  tag:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

  # Build binaries for multiple platforms
  build:
    needs: [version, tag]
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: linux-arm64
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev cmake build-essential

      - name: Install MinGW (Windows GNU target)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y --no-progress
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH

      - name: Ensure GNU target libs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/waxum dist/
          cd dist
          tar -czvf waxum-${{ needs.version.outputs.version }}-${{ matrix.name }}.tar.gz waxum
          rm waxum

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/waxum.exe" -Destination "dist/"
          Compress-Archive -Path "dist/waxum.exe" -DestinationPath "dist/waxum-${{ needs.version.outputs.version }}-${{ matrix.name }}.zip"
          Remove-Item "dist/waxum.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waxum-${{ matrix.name }}
          path: dist/*

  # Build Docker images per architecture on native runners, then stitch a manifest.
  # Native arm64 kills the QEMU tax and drops end-to-end wall clock from ~90 min to ~20 min.
  docker:
    needs: [version, tag]
    if: needs.version.outputs.should_release == 'true'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  # Stitch the per-arch tags into one multi-arch manifest.
  docker-manifest:
    needs: [version, docker]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          IMAGE="${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

  # Create GitHub Release with artifacts
  release:
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          find artifacts -name '*.zip' -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || true
          cat checksums.txt

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          IMAGE="${{ env.IMAGE_NAME }}"

          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          {
            echo "## What's Changed"
            echo ""
            echo "${CHANGES}"
            echo ""
            echo "## Installation"
            echo ""
            echo "### Docker"
            echo '```bash'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "### Binary Downloads"
            echo ""
            echo "| Platform | Architecture | Download |"
            echo "|----------|--------------|----------|"
            echo "| Linux | x86_64 | \`waxum-${VERSION}-linux-amd64.tar.gz\` |"
            echo "| Linux | ARM64 | \`waxum-${VERSION}-linux-arm64.tar.gz\` |"
            echo "| Windows | x86_64 | \`waxum-${VERSION}-windows-amd64.zip\` |"
            echo ""
            echo "### Database Support"
            echo "Supports PostgreSQL, MySQL, and SQLite. Set \`DATABASE_URL\` in your \`.env\`:"
            echo '```bash'
            echo "# PostgreSQL"
            echo "DATABASE_URL=postgres://user:pass@localhost:5432/wagateway"
            echo "# MySQL"
            echo "DATABASE_URL=mysql://user:pass@localhost:3306/wagateway"
            echo "# SQLite"
            echo "DATABASE_URL=sqlite://waxum.db"
            echo '```'
            echo ""
            echo "## Verify Checksums"
            echo '```bash'
            echo "sha256sum -c checksums.txt"
            echo '```'
          } > /tmp/release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Waxum v${{ needs.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt
          body_path: /tmp/release-body.md
