services:
  postgres:
    image: postgres:16
    container_name: wagateway-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wagateway
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: wagateway-nats
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wagateway-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wagateway
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      SUPERADMIN_TOKEN: ${SUPERADMIN_TOKEN:-}
      WHATSAPP_STORAGE_PATH: /app/whatsapp_sessions
      NATS_URL: nats://nats:4222
      RUST_LOG: wa_rs=info,tower_http=info
    volumes:
      - whatsapp_sessions:/app/whatsapp_sessions
    ports:
      - "3451:3451"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  whatsapp_sessions:
  nats_data:
